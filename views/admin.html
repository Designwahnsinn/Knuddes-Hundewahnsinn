<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materialien verwalten – Knuddels Hundewahnsinn</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .admin-header h1 { color: var(--accent); font-size: 1.6rem; }
    .logout-form button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .logout-form button:hover { border-color: var(--accent); color: var(--accent); }

    .upload-form {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2.5rem;
      display: grid;
      gap: 0.9rem;
      max-width: 480px;
    }
    .upload-form label { font-weight: 600; font-size: 0.9rem; }
    .upload-form input[type="text"],
    .upload-form input[type="number"],
    .upload-form select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      background: #fff;
    }
    .upload-form button[type="submit"] {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 0.7rem 1rem;
      cursor: pointer;
    }
    #form-message { font-size: 0.9rem; }
    #form-message.error { color: #c0392b; }
    #form-message.success { color: #2d7a4f; }

    .admin-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }
    .admin-card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .admin-card img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .admin-card-body { padding: 1rem; }
    .admin-card h3 { font-size: 1rem; margin-bottom: 0.2rem; }
    .admin-card .category { color: var(--accent); font-size: 0.8rem; font-weight: 600; margin-bottom: 0.3rem; }
    .admin-card .price { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.75rem; }
    .delete-btn {
      border: none;
      background: #c0392b;
      color: #fff;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .delete-btn:hover { opacity: 0.9; }

    .section-heading {
      color: var(--accent);
      font-size: 1.3rem;
      margin: 3rem 0 1.25rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .request-list { display: grid; gap: 1rem; }
    .request-card {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .request-info h3 { font-size: 1rem; margin-bottom: 0.2rem; }
    .request-info .contact { color: var(--muted); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .request-info .choices { display: flex; gap: 1rem; margin-bottom: 0.5rem; }
    .request-info .choices div { text-align: center; font-size: 0.75rem; color: var(--muted); }
    .request-info .choices img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; display: block; margin-bottom: 0.25rem; }
    .request-info .note { font-size: 0.85rem; color: var(--text); }
    .empty-hint { color: var(--muted); font-style: italic; font-size: 0.9rem; }
  </style>
</head>
<body>
  <main>
    <div class="admin-header">
      <h1>Materialien verwalten</h1>
      <form class="logout-form" action="/mitarbeiter/logout" method="POST">
        <button type="submit">Abmelden</button>
      </form>
    </div>

    <form class="upload-form" id="upload-form">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="category">Kategorie</label>
        <select id="category" name="category" required></select>
      </div>
      <div>
        <label for="price">Preis (€)</label>
        <input type="number" id="price" name="price" step="0.01" min="0">
      </div>
      <div>
        <label for="image">Bild (PNG, JPG, WEBP, AVIF)</label>
        <input type="file" id="image" name="image" accept="image/png,image/jpeg,image/webp,image/avif" required>
      </div>
      <button type="submit">Material hochladen</button>
      <p id="form-message"></p>
    </form>

    <div class="admin-cards" id="admin-cards"></div>

    <h2 class="section-heading">Konfigurator-Anfragen</h2>
    <div class="request-list" id="request-list"></div>
    <p class="empty-hint" id="request-empty" hidden>Noch keine Anfragen eingegangen.</p>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
